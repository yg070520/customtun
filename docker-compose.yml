services:
  # Production instance (default ports)
  tunnl:
    image: ghcr.io/yg070520/customtun:latest
    container_name: tunnl
    restart: unless-stopped
    network_mode: "host"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
