services:
  # Production instance (default ports)
  tunnl:
    image: ghcr.io/yg070520/customtun:lastest
    container_name: tunnl
    restart: unless-stopped
    ports:
      - "8888:8888"      # SSH tunnel connections
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
